app = "gameinsights-bot"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[deploy]
  strategy = "immediate"
  kill_signal = "SIGINT"
  kill_timeout = "30s"

[env]
  GAMEINSIGHTS_BOT_API_BASE_URL = "https://gameinsights-api.fly.dev"

# No [http_service] — bot is a long-running process, not HTTP
[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
