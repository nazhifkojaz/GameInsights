name: CI (Library)

on:
  push:
    branches: [main]
    paths: ["lib/**", "pyproject.toml"]
  pull_request:
    paths: ["lib/**", "pyproject.toml"]

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lib
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv
      uses: astral-sh/setup-uv@v4
    - run: uv sync --group dev --extra dataframe
    - run: uv run ruff check gameinsights/ tests/ --output-format=github
    - run: uv run black --check gameinsights/ tests/
    - run: uv run mypy gameinsights/
    - run: uv run pytest -vv --cov=gameinsights tests/
    - name: Upload coverage
      if: matrix.python-version == '3.12'
      uses: codecov/codecov-action@v3
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
