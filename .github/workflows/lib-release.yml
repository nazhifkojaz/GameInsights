name: Release

on:
  workflow_dispatch:
    inputs:
      publish-target:
        description: "Registry to publish to (defaults to PyPI on tagged pushes)"
        type: choice
        options:
          - testpypi
          - pypi
        default: pypi
      publish:
        description: "Publish the build artifacts (disable for dry runs)"
        type: boolean
        default: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lib

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --group dev --extra dataframe

      - name: Ruff lint
        run: uv run ruff check gameinsights/ tests/ --output-format=github

      - name: Black formatting check
        run: uv run black --check gameinsights/ tests/

      - name: MyPy type check
        run: uv run mypy gameinsights/

      - name: Run tests
        run: uv run pytest -vv --maxfail=1

      - name: Build distribution
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: lib/dist/*
          if-no-files-found: error

  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')

    steps:
      - name: Determine publish target
        id: target
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_TARGET: ${{ github.event.inputs.publish-target }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "value=$DISPATCH_TARGET" >> "$GITHUB_OUTPUT"
          else
            echo "value=pypi" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: lib/dist

      - name: Publish to package index
        working-directory: lib
        env:
          PUBLISH_TARGET: ${{ steps.target.outputs.value }}
          PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
          TEST_PYPI_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          if [ "$PUBLISH_TARGET" = "testpypi" ]; then
            if [ -z "$TEST_PYPI_TOKEN" ]; then
              echo "TEST_PYPI_API_TOKEN secret is not set" >&2
              exit 1
            fi
            UV_PUBLISH_TOKEN="$TEST_PYPI_TOKEN" uv publish --publish-url https://test.pypi.org/legacy/
          else
            if [ -z "$PYPI_TOKEN" ]; then
              echo "PYPI_API_TOKEN secret is not set" >&2
              exit 1
            fi
            UV_PUBLISH_TOKEN="$PYPI_TOKEN" uv publish
          fi
